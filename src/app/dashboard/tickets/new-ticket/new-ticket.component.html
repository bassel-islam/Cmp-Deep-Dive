<form (ngSubmit)="onSubmit(title.value, ticketText.value)" #form>
  <app-control label="Title">
    <input name="title" id="title" #title/>
  </app-control>
  <app-control label="Request">
    <textarea name="request" id="request" rows="3" #ticketText></textarea>
  </app-control>
  <p>
    <button appButton [btnText]="'Submit'" [btnIcon]="'⌲'"></button>
  </p>
</form>
